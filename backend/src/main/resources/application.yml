# Spring Boot 애플리케이션 설정
# Backend 포트, H2 DB, JPA, 초기 SQL 위치를 정의합니다.

spring:
  application:
    name: demo-backend
  datasource:
    # H2 파일 DB — backend/data/demo-db.mv.db 로 저장됨
    url: jdbc:h2:file:./data/demo-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update   # Entity 변경 시 테이블 자동 갱신
    show-sql: true       # 실행 SQL 콘솔 출력
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      # 앱 시작 시 상품·품목 시드 SQL 실행
      data-locations: classpath:db/data.sql, classpath:db/data-models.sql

server:
  port: 8081  # Frontend vite proxy target
